name: Verify Billions Agent Identity

on:
  workflow_dispatch:

jobs:
  verify-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Billions Identity Skill
        run: npx clawhub@latest install verified-agent-identity

      - name: Generate Agent Identity
        run: node scripts/createNewEthereumIdentity.js

      - name: Generate Verification Link
        run: |
          node scripts/manualLinkHumanToAgent.js --challenge '{"name":"MyGitHubAgent","description":"Automated agent for repo tasks"}'
